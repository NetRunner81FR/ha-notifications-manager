input_boolean:
  notif_smtp_active:
    name: "Notifications - SMTP actif"
    icon: mdi:email-check-outline

script:
  notify_transverse:
    alias: "Notifications - Script transverse"
    mode: parallel
    max: 10
    fields:
      title:
        description: "Notification title"
      message:
        description: "Notification message"
      category:
        description: "Severity: info, alerte, critique"
      roles:
        description: "Target roles: admin, proprietaire, resident, utilisateur"
      tiers:
        description: "Legacy alias for roles"
    sequence:
      - variables:
          slugs: >
            {% set ns = namespace(slugs=[]) %}
            {% for e in states.text %}
              {% if e.entity_id.startswith('text.notif_') and e.entity_id.endswith('_label') %}
                {% set slug = e.entity_id | replace('text.notif_', '') | replace('_label', '') %}
                {% set ns.slugs = ns.slugs + [slug] %}
              {% endif %}
            {% endfor %}
            {{ ns.slugs }}
          target_roles: "{{ roles | default(tiers | default([])) }}"
          effective_title: "{{ title | default('') }}"

      - repeat:
          for_each: "{{ slugs }}"
          sequence:
            - variables:
                slug: "{{ repeat.item }}"
                role_match: >
                  {% set ns = namespace(match=false) %}
                  {% for role in target_roles %}
                    {% if is_state('switch.notif_' ~ slug ~ '_role_' ~ role, 'on') %}
                      {% set ns.match = true %}
                    {% endif %}
                  {% endfor %}
                  {{ ns.match }}
                push_target: "{{ states('text.notif_' ~ slug ~ '_push_target') | trim }}"
                push_ok: >
                  {% set target = states('text.notif_' ~ slug ~ '_push_target') | trim %}
                  {{ is_state('switch.notif_' ~ slug ~ '_push_enabled', 'on')
                     and target not in ['', 'unknown', 'unavailable', 'none'] }}
                email_addr: "{{ states('text.notif_' ~ slug ~ '_email') | trim }}"
                email_ok: >
                  {% set addr = states('text.notif_' ~ slug ~ '_email') | trim %}
                  {{ is_state('input_boolean.notif_smtp_active', 'on')
                     and is_state('switch.notif_' ~ slug ~ '_email_enabled', 'on')
                     and addr not in ['', 'unknown', 'unavailable', 'none'] }}

            - choose:
                - conditions: "{{ role_match and push_ok }}"
                  sequence:
                    - service: "{{ push_target }}"
                      continue_on_error: true
                      data:
                        title: "{{ effective_title }}"
                        message: "{{ message | default('') }}"

            - choose:
                - conditions: "{{ role_match and email_ok }}"
                  sequence:
                    - service: notify.notify_smtp
                      continue_on_error: true
                      data:
                        title: "{{ effective_title }}"
                        message: "{{ message | default('') }}"
                        target: "{{ email_addr }}"
