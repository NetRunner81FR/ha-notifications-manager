views:
  - title: Notifications Manager
    path: notifications-manager
    icon: mdi:bell-cog-outline
    type: sections
    max_columns: 2
    sections:
      - type: grid
        title: Users
        cards:
          - type: entities
            title: Admin demo
            show_header_toggle: false
            entities:
              - entity: text.notif_admin_demo_label
              - entity: text.notif_admin_demo_email
              - entity: switch.notif_admin_demo_email_enabled
              - entity: text.notif_admin_demo_push_target
              - entity: switch.notif_admin_demo_push_enabled
          - type: entities
            title: User demo
            show_header_toggle: false
            entities:
              - entity: text.notif_user_demo_label
              - entity: text.notif_user_demo_email
              - entity: switch.notif_user_demo_email_enabled
              - entity: text.notif_user_demo_push_target
              - entity: switch.notif_user_demo_push_enabled

      - type: grid
        title: Roles
        cards:
          - type: entities
            title: Admin demo roles
            show_header_toggle: false
            entities:
              - entity: switch.notif_admin_demo_role_admin
              - entity: switch.notif_admin_demo_role_proprietaire
              - entity: switch.notif_admin_demo_role_resident
              - entity: switch.notif_admin_demo_role_utilisateur
          - type: entities
            title: User demo roles
            show_header_toggle: false
            entities:
              - entity: switch.notif_user_demo_role_admin
              - entity: switch.notif_user_demo_role_proprietaire
              - entity: switch.notif_user_demo_role_resident
              - entity: switch.notif_user_demo_role_utilisateur

      - type: grid
        title: Global
        column_span: 2
        cards:
          - type: markdown
            content: >
              This example dashboard uses only native Lovelace cards. It does
              not install or require any frontend plugin. Keep real emails,
              SMTP settings and mobile_app targets outside Git.
          - type: entities
            title: SMTP
            show_header_toggle: false
            entities:
              - entity: input_boolean.notif_smtp_active
